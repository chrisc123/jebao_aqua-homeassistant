name: Pull Request

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: write

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    # Run on code changes (opened, synchronize, reopened, ready_for_review),
    # and also when the release label is applied (to confirm tests pass before publishing).
    # Skip when other labels are applied.
    if: github.event.action != 'labeled' || github.event.label.name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-asyncio homeassistant

      - name: Run tests
        run: pytest --tb=short -v

  auto-bump-version:
    name: Auto-bump patch version if needed
    runs-on: ubuntu-latest
    # Run when the 'release' label is applied to a ready (non-draft) PR,
    # and also when a labeled draft PR becomes ready or receives new commits.
    # Skip for fork PRs since this job writes back to the PR branch.
    if: >
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'release') ||
        (
          (github.event.action == 'ready_for_review' || github.event.action == 'synchronize') &&
          contains(github.event.pull_request.labels.*.name, 'release')
        )
      )
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Bump patch version if not already ahead of latest release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/jebao_aqua/manifest.json'))['version'])")
          LATEST_TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --exclude-pre-releases --json tagName --jq '.[0].tagName // ""')

          if [ -z "$LATEST_TAG" ]; then
            echo "No stable release found. Using manifest version $MANIFEST_VERSION."
            echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_VERSION="${LATEST_TAG#v}"

          # Strip any pre-release suffix (e.g. 0.3.7-beta -> 0.3.7)
          M="${MANIFEST_VERSION%%-*}"
          L="${LATEST_VERSION%%-*}"

          IFS='.' read -r M_MAJ M_MIN M_PAT <<< "$M"
          IFS='.' read -r L_MAJ L_MIN L_PAT <<< "$L"

          NEEDS_BUMP=false
          if [ "$M_MAJ" -lt "$L_MAJ" ]; then
            NEEDS_BUMP=true
          elif [ "$M_MAJ" -eq "$L_MAJ" ] && [ "$M_MIN" -lt "$L_MIN" ]; then
            NEEDS_BUMP=true
          elif [ "$M_MAJ" -eq "$L_MAJ" ] && [ "$M_MIN" -eq "$L_MIN" ] && [ "$M_PAT" -le "$L_PAT" ]; then
            NEEDS_BUMP=true
          fi

          if [ "$NEEDS_BUMP" = "true" ]; then
            NEW_VERSION="${L_MAJ}.${L_MIN}.$((L_PAT + 1))"
            echo "Bumping version: $MANIFEST_VERSION -> $NEW_VERSION"
            python3 -c "import json; f=open('custom_components/jebao_aqua/manifest.json','r+'); d=json.load(f); d['version']='$NEW_VERSION'; f.seek(0); json.dump(d,f,indent=2); f.write('\n'); f.truncate()"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add custom_components/jebao_aqua/manifest.json
            git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
            git push
          else
            NEW_VERSION="$M"
            echo "Version $M is already ahead of $L. No bump needed."
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  beta-release:
    name: Publish beta prerelease
    runs-on: ubuntu-latest
    needs: [auto-bump-version, test]
    # Implicitly skipped unless auto-bump-version ran (i.e. 'release' label was applied)

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.auto-bump-version.outputs.sha }}

      - name: Determine next beta tag
        id: beta_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.auto-bump-version.outputs.version }}"

          EXISTING=$(gh release list --repo "${{ github.repository }}" --limit 100 \
            --json tagName --jq '.[].tagName' | grep "^v${VERSION}-beta" || true)

          if [ -z "$EXISTING" ]; then
            TAG="v${VERSION}-beta"
          else
            MAX=1
            while IFS= read -r tag; do
              NUM=$(echo "$tag" | sed "s/^v${VERSION}-beta//")
              [ -z "$NUM" ] && NUM=1
              [ "$NUM" -gt "$MAX" ] 2>/dev/null && MAX=$NUM
            done <<< "$EXISTING"
            TAG="v${VERSION}-beta$((MAX + 1))"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create zip archive
        run: zip -r jebao_aqua.zip custom_components/jebao_aqua/

      - name: Tag the PR branch commit
        run: |
          git tag "${{ steps.beta_tag.outputs.tag }}" "${{ needs.auto-bump-version.outputs.sha }}"
          git push origin "${{ steps.beta_tag.outputs.tag }}"

      - name: Publish beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.beta_tag.outputs.tag }}
          name: ${{ steps.beta_tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: jebao_aqua.zip
