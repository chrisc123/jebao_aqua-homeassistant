name: Release

on:
  push:
    branches:
      - main
workflow_dispatch:
  
permissions:
  contents: write

jobs:
  release:
    name: Create stable release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get version and HEAD SHA
        id: meta
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/jebao_aqua/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.meta.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag the merge commit on main
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.meta.outputs.version }}" "${{ steps.meta.outputs.sha }}"
          git push origin "v${{ steps.meta.outputs.version }}"

      - name: Create stable release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          prerelease: false
          generate_release_notes: true
